<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel AI: Agent Calibration</title>
  <style>
    body {
      background: #000;
      color: #00f8bb;
      font-family: inherit; /* Fallback to default, will be styled via Orbitron if available */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px;
      border: 1px solid rgba(0, 248, 187, 0.2);
      border-radius: 12px;
      background: rgba(0, 248, 187, 0.05);
      box-shadow: 0 0 50px rgba(0, 248, 187, 0.1);
      max-width: 500px;
    }
    h1 {
      font-size: 24px;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
    }
    p {
      color: #fff;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 30px;
      opacity: 0.8;
    }
    button {
      background: #00f8bb;
      color: #000;
      border: none;
      padding: 16px 32px;
      font-family: inherit;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(0, 248, 187, 0.3);
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(0, 248, 187, 0.5);
    }
    .status {
      margin-top: 20px;
      font-size: 12px;
      color: #fff;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      <circle cx="12" cy="12" r="3"></circle>
    </svg>
    <h1>AGENT CALIBRATION</h1>
    <p>
      Chrome security protocols require manual authorization for background microphone access. 
      Click below to grant the Sentinel AI permanent permission for the "Hey Sentinel" wake-up call.
    </p>
    <button id="auth-btn">Authorize Sentinel</button>
    <div class="status" id="status-text">Awaiting operative authorization...</div>
  </div>
  <script type="module" src="src/setup.ts"></script>
</body>
</html>
